<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>what-next · timeline</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dayjs/1.11.10/dayjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leader-line/1.0.8/leader-line.min.js"></script>
<style>
:root{
  --bg:#0e0e12;--bg2:#17171c;--bg3:#1c1c20;--bg4:#26262b;
  --tx1:#e4e4e7;--tx2:#a1a1aa;--tx3:#5a5a65;
  --brd:rgba(255,255,255,0.08);--accent:#0d9488;
  --glow:0 0 12px rgba(13,148,136,0.4);
  --px-day:58;
  --card-min:172px;
  --card-h:78px;
  --row-gap:10px;
  --lane-pad:12px;
  --axis-h:52px;
  --label-w:110px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Inter',system-ui,sans-serif;background:var(--bg);color:var(--tx1);height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased}

/* App shell */
.shell{display:flex;flex-direction:column;height:100vh}
.topbar{display:flex;align-items:center;gap:8px;height:44px;padding:0 14px;background:var(--bg2);border-bottom:1px solid var(--brd);flex-shrink:0}
.topbar a{font-size:12px;color:var(--tx3);text-decoration:none}.topbar a:hover{color:var(--tx2)}
.topbar h1{font-size:14px;font-weight:700;flex:1}
.user-toggle{display:flex;background:var(--bg3);border-radius:6px;padding:2px;gap:2px}
.user-btn{border:none;background:transparent;color:var(--tx3);font-size:10px;font-weight:600;padding:4px 10px;border-radius:4px;cursor:pointer;transition:all .15s}
.user-btn.active{background:var(--bg4);color:var(--tx1)}
.view-toggle{display:flex;background:var(--bg3);border-radius:6px;padding:2px;gap:2px;margin-left:8px}
.view-btn{border:none;background:transparent;color:var(--tx3);font-size:10px;font-weight:600;padding:4px 10px;border-radius:4px;cursor:pointer;transition:all .15s}
.view-btn.active{background:var(--bg4);color:var(--tx1)}

/* Domain legend */
.legend{display:flex;align-items:center;gap:14px;padding:6px 14px;background:var(--bg2);border-bottom:1px solid var(--brd);flex-shrink:0;flex-wrap:wrap}
.li{display:flex;align-items:center;gap:5px;font-size:9px;color:var(--tx3);font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.li-dot{width:7px;height:7px;border-radius:50%}
.legend-right{margin-left:auto;display:flex;gap:14px;align-items:center}

/* Outer scroll wrapper */
.tl-outer{flex:1;overflow:auto;position:relative}

/* Inner canvas — sized dynamically by JS */
.tl-canvas{position:relative;min-height:100%}

/* Axis bar (sticky top) */
.tl-axis{position:sticky;top:0;left:0;height:var(--axis-h);background:var(--bg);border-bottom:1px solid var(--brd);z-index:30;pointer-events:none}
.tl-axis svg{position:absolute;top:0;left:0;width:100%;height:100%}

/* Swimlane rows */
.lane{position:absolute;left:0;right:0}
.lane-label{position:sticky;left:0;width:var(--label-w);background:var(--bg);z-index:20;display:flex;align-items:center;padding:0 10px 0 14px;gap:0;border-right:1px solid var(--brd);height:100%}
.lane-label-inner{display:flex;flex-direction:column;gap:2px}
.lane-name{font-size:11px;font-weight:700;letter-spacing:.3px}
.lane-count{font-size:9px;color:var(--tx3)}
.lane-bg{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none}
.lane-border{position:absolute;bottom:0;left:0;right:0;height:1px;background:var(--brd)}

/* Cards — exact same classes as what-next */
.card{
  position:absolute;
  border-radius:8px;background:var(--bg2);border:1px solid var(--brd);
  cursor:pointer;transition:border-color .15s,box-shadow .15s;
  overflow:hidden;
  height:var(--card-h);
  padding:8px 10px 8px 16px;
}
.card:hover{border-color:rgba(255,255,255,0.15);z-index:10}
.card.selected{border-color:var(--accent);box-shadow:var(--glow);z-index:11}
.card.alldone{opacity:0.25}
.card.alldone .c-name{text-decoration:line-through}
.card.blocked-card{opacity:0.45}
.stripe{position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:8px 0 0 8px}
.c-row{display:flex;align-items:center;gap:5px;min-width:0}
.c-domain{font-size:7px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;padding:1px 5px;border-radius:3px;border:1.5px solid;flex-shrink:0}
.c-name{font-size:11px;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.c-lock{font-size:7px;font-weight:700;padding:1px 4px;border-radius:3px;background:var(--bg3);color:var(--tx3);text-transform:uppercase;letter-spacing:.3px;flex-shrink:0}
.c-meta{display:flex;align-items:center;gap:4px;margin-top:5px;flex-wrap:nowrap;overflow:hidden}
.c-pill{font-size:7px;font-weight:700;padding:1px 5px;border-radius:3px;text-transform:uppercase;letter-spacing:.3px;flex-shrink:0}
.c-date{font-size:8px;color:var(--tx2);white-space:nowrap;flex-shrink:0}
.c-tp{font-size:7px;font-weight:700;padding:1px 5px;border-radius:4px;color:#fff;flex-shrink:0}
.c-pbar{height:2px;background:var(--bg3);border-radius:1px;margin-top:6px;overflow:hidden}
.c-pbar-fill{height:100%;border-radius:1px}

/* Done checkmark overlay */
.c-done-mark{position:absolute;top:6px;right:8px;font-size:11px;font-weight:700}

/* Loading */
#loading{display:flex;align-items:center;justify-content:center;height:100vh;color:var(--tx3);font-size:13px;gap:8px}

/* Tooltip */
.tl-tip{position:fixed;pointer-events:none;background:var(--bg2);border:1px solid var(--brd);border-radius:6px;padding:8px 11px;font-size:11px;color:var(--tx1);max-width:220px;opacity:0;transition:opacity .1s;z-index:999;line-height:1.5}
.tl-tip.show{opacity:1}
.tl-tip-domain{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.tl-tip-name{font-weight:600;font-size:12px;white-space:normal}
.tl-tip-meta{font-size:9px;color:var(--tx3);margin-top:3px}

/* Today marker */
.today-line{position:absolute;top:0;bottom:0;width:1.5px;background:#ef4444;opacity:.6;pointer-events:none;z-index:15}
.today-label{position:absolute;top:var(--axis-h);font-size:8px;font-weight:700;color:#ef4444;opacity:.8;white-space:nowrap;pointer-events:none;z-index:16;transform:translateX(-50%)}
</style>
</head>
<body>
<div id="loading"><span>⬡</span> loading…</div>
<div class="shell" id="app" style="display:none">
  <div class="topbar">
    <a href="/">← board</a>
    <h1>what-next · timeline</h1>
    <div class="user-toggle" id="userToggle"></div>
    <div class="view-toggle">
      <button class="view-btn active" data-view="current">current</button>
      <button class="view-btn" data-view="archived">archived</button>
    </div>
  </div>
  <div class="legend" id="legend"></div>
  <div class="tl-outer" id="tlOuter">
    <div class="tl-canvas" id="tlCanvas">
      <div class="tl-axis" id="tlAxis"></div>
    </div>
  </div>
</div>
<div class="tl-tip" id="tip"></div>

<script>
const DM={CTI:'#60a5fa',ECM:'#c084fc',CSD:'#5eead4',GRA:'#7dd3fc',Personal:'#a5b4fc'};
const TL=['snap','sesh','grind'],SL=['low','high','crit'];
const SC=[{bg:'var(--bg3)',fg:'var(--tx3)'},{bg:'#C9652A',fg:'#fff'},{bg:'#D92B2B',fg:'#fff'}];
const dc=d=>DM[d]||'#71717a';
const TODAY=dayjs().startOf('day');

const PX_DAY=58,CARD_MIN=172,CARD_H=78,ROW_GAP=10,LANE_PAD=12,AXIS_H=52,LABEL_W=110;
const MARGIN_DAYS=1;// padding before first / after last task

let state={slug:null,users:[],tasks:[],view:'current',selectedId:null};
let leaderLines=[];

// ── Helpers ──────────────────────────────────────────────────

function isBlocked(t){
  if(!t.needs||!t.needs.length)return false;
  for(const bid of t.needs){
    const dep=state.tById[bid];if(!dep)continue;
    if(dep.subs&&dep.subs.length){if(!dep.subs.every(s=>s.done))return true}
    else{if(!dep.done)return true}
  }return false;
}
function taskDone(t){
  if(t.subs&&t.subs.length)return t.subs.every(s=>s.done)&&!isBlocked(t);
  return!!t.done&&!isBlocked(t);
}
function taskProgress(t){
  if(!t.subs||!t.subs.length)return t.done?1:0;
  return t.subs.filter(s=>s.done).length/t.subs.length;
}
function daysFromToday(ds){
  if(!ds)return 999;
  return dayjs(ds).startOf('day').diff(TODAY,'day');
}

// ── Data ─────────────────────────────────────────────────────

async function loadUsers(){
  const {users}=await fetch('/api/users').then(r=>r.json());
  state.users=users;
  const me=await fetch('/api/me').then(r=>r.json());
  state.slug=me.user?.slug||users[0]?.slug;
}

async function loadTasks(){
  const vp=state.view==='archived'?'?view=archived':'';
  const {tasks}=await fetch(`/api/users/${state.slug}/tasks${vp}`).then(r=>r.json());
  tasks.forEach(t=>{t.needs=t.needs||[];t.subs=t.subs||[]});
  state.tasks=tasks;
  state.tById={};tasks.forEach(t=>{state.tById[t.id]=t});
}

// ── Layout computation ────────────────────────────────────────

function computeLayout(){
  const tasks=state.tasks;
  if(!tasks.length)return null;

  // Date range
  const dates=tasks.flatMap(t=>[t.plan_date,t.due_date].filter(Boolean)).map(d=>dayjs(d));
  const startD=dates.reduce((a,b)=>a.isBefore(b)?a:b).subtract(MARGIN_DAYS,'day');
  const endD=dates.reduce((a,b)=>a.isAfter(b)?a:b).add(MARGIN_DAYS,'day');
  const totalDays=endD.diff(startD,'day')+1;

  // x position of a date
  function xOf(ds){
    return LABEL_W+dayjs(ds).startOf('day').diff(startD,'day')*PX_DAY;
  }

  // Group by domain (preserve DM order)
  const domOrder=Object.keys(DM).filter(d=>tasks.some(t=>t.domain===d));
  const byDom={};
  domOrder.forEach(d=>{byDom[d]=tasks.filter(t=>t.domain===d).sort((a,b)=>dayjs(a.plan_date||a.due_date).diff(dayjs(b.plan_date||b.due_date)))});

  // Per-card layout: x, y-within-lane, w, h
  const cardLayout={};// id -> {x, row, w}
  const laneMeta={};// domain -> {nRows, y}

  let laneTop=AXIS_H;
  domOrder.forEach(dom=>{
    const dt=byDom[dom];
    const rows=[];// rows[r] = dayjs of last end in that row

    dt.forEach(t=>{
      const ts=dayjs(t.plan_date||t.due_date||TODAY.format('YYYY-MM-DD'));
      const te=dayjs(t.due_date||t.plan_date||TODAY.format('YYYY-MM-DD'));
      const naturalW=(te.diff(ts,'day')+1)*PX_DAY-4;
      const w=Math.max(CARD_MIN,naturalW);
      const x=xOf(ts.format('YYYY-MM-DD'));

      // Find first row with no overlap (card end date = ts + w/PX_DAY days)
      const cardEndDate=ts.add(Math.ceil(w/PX_DAY),'day');
      let row=0;
      while(rows[row]&&rows[row].isAfter(ts,'day'))row++;
      rows[row]=cardEndDate;
      cardLayout[t.id]={x,row,w,x0:xOf(ts.format('YYYY-MM-DD'))};
    });

    const nRows=rows.length||1;
    const laneH=LANE_PAD+nRows*(CARD_H+ROW_GAP)-ROW_GAP+LANE_PAD;
    laneMeta[dom]={nRows,y:laneTop,h:laneH};
    laneTop+=laneH;
  });

  // Absolute y of each card
  Object.keys(cardLayout).forEach(id=>{
    const t=state.tById[id];if(!t)return;
    const lm=laneMeta[t.domain];if(!lm)return;
    cardLayout[id].y=lm.y+LANE_PAD+cardLayout[id].row*(CARD_H+ROW_GAP);
  });

  const totalW=LABEL_W+totalDays*PX_DAY;
  const totalH=laneTop+8;

  return{startD,endD,totalDays,totalW,totalH,xOf,domOrder,byDom,cardLayout,laneMeta};
}

// ── Render ────────────────────────────────────────────────────

function render(){
  destroyLines();
  const canvas=document.getElementById('tlCanvas');
  // Remove old lanes + today marker (keep axis)
  Array.from(canvas.children).forEach(el=>{
    if(!el.classList.contains('tl-axis'))el.remove();
  });

  const L=computeLayout();
  if(!L){canvas.innerHTML+='<div style="padding:60px;color:var(--tx3);font-size:13px">No tasks</div>';return;}
  const{startD,endD,totalDays,totalW,totalH,xOf,domOrder,byDom,cardLayout,laneMeta}=L;

  canvas.style.width=totalW+'px';
  canvas.style.height=totalH+'px';

  // Axis SVG
  renderAxis(startD,totalDays,totalW);

  // Today vertical line
  const todayX=xOf(TODAY.format('YYYY-MM-DD'));
  if(todayX>=LABEL_W){
    const tl=document.createElement('div');tl.className='today-line';
    tl.style.cssText=`left:${todayX}px;top:${AXIS_H}px;height:${totalH-AXIS_H}px`;
    canvas.appendChild(tl);
    const tlab=document.createElement('div');tlab.className='today-label';
    tlab.style.left=todayX+'px';tlab.textContent='today';
    canvas.appendChild(tlab);
  }

  // Swimlanes
  domOrder.forEach(dom=>{
    const lm=laneMeta[dom],c=dc(dom);
    const lane=document.createElement('div');
    lane.className='lane';
    lane.style.cssText=`top:${lm.y}px;height:${lm.h}px`;
    lane.innerHTML=`
      <div class="lane-bg" style="background:${c};opacity:.03"></div>
      <div class="lane-border"></div>
      <div class="lane-label" style="height:${lm.h}px">
        <div class="lane-label-inner">
          <span class="lane-name" style="color:${c}">${dom}</span>
          <span class="lane-count">${byDom[dom].length} task${byDom[dom].length!==1?'s':''}</span>
        </div>
      </div>`;
    canvas.appendChild(lane);
  });

  // Cards
  state.tasks.forEach(t=>{
    const cl=cardLayout[t.id];if(!cl)return;
    const card=buildCard(t,cl);
    canvas.appendChild(card);
  });

  // Leader Line arrows — after cards are in DOM
  requestAnimationFrame(()=>drawLines(cardLayout));
}

function renderAxis(startD,totalDays,totalW){
  const axis=document.getElementById('tlAxis');
  const H=AXIS_H;
  let s=`<svg width="${totalW}" height="${H}" xmlns="http://www.w3.org/2000/svg">`;
  // Label column background
  s+=`<rect x="0" y="0" width="${LABEL_W}" height="${H}" fill="var(--bg2)"/>`;
  s+=`<text x="${LABEL_W/2}" y="${H/2+1}" fill="var(--tx3)" font-size="9" font-weight="700" text-anchor="middle" dominant-baseline="central" letter-spacing="1">DATE</text>`;

  for(let i=0;i<=totalDays;i++){
    const d=startD.add(i,'day');
    const x=LABEL_W+i*PX_DAY;
    const dow=d.day();// 0=Sun,1=Mon
    const isWeekStart=dow===1||(i===0);
    const isToday=d.isSame(TODAY,'day');

    // Grid line
    s+=`<line x1="${x}" y1="${H*0.55}" x2="${x}" y2="${H}" stroke="rgba(255,255,255,${isWeekStart?.08:.03})" stroke-width="${isWeekStart?1:.5}"/>`;

    if(isWeekStart||i===0){
      // Week label
      s+=`<text x="${x+PX_DAY/2}" y="${H*0.28}" fill="#4a4a55" font-size="8" font-weight="600" text-anchor="middle" letter-spacing=".3">${d.format('MMM D')}</text>`;
    }
    // Day number
    if(PX_DAY>=40){
      s+=`<text x="${x+PX_DAY/2}" y="${H*0.72}" fill="${isToday?'#ef4444':dow===0||dow===6?'#3a3a45':'#5a5a65'}" font-size="8" font-weight="${isToday?'700':'400'}" text-anchor="middle" dominant-baseline="central">${d.date()}</text>`;
    }
    if(isToday){
      s+=`<line x1="${x}" y1="0" x2="${x}" y2="${H}" stroke="#ef4444" stroke-width="1.5" opacity=".5"/>`;
    }
  }
  s+=`</svg>`;
  axis.innerHTML=s;
}

function buildCard(t,cl){
  const col=dc(t.domain),label=DM[t.domain]?t.domain.slice(0,3).toUpperCase():'???';
  const done=taskDone(t),blocked=isBlocked(t),prog=taskProgress(t);
  const dd=daysFromToday(t.due_date);
  const sc=SC[t.stakes]||SC[0];
  const hasSubs=t.subs&&t.subs.length>0;

  const card=document.createElement('div');
  card.className='card'+(done?' alldone':'')+(blocked?' blocked-card':'')+(state.selectedId===t.id?' selected':'');
  card.id='card-'+t.id;
  card.style.cssText=`left:${cl.x}px;top:${cl.y}px;width:${cl.w}px`;
  card.dataset.tid=t.id;

  const ddColor=dd<=0?'#ef4444':dd<=2?'#C9652A':dd<=5?'#A67A4B':'#3f3f46';
  const pbar=hasSubs?`<div class="c-pbar"><div class="c-pbar-fill" style="width:${Math.round(prog*100)}%;background:${col}"></div></div>`:'';

  card.innerHTML=`
    <div class="stripe" style="background:${col}"></div>
    <div class="c-row">
      <span class="c-domain" style="color:${col};border-color:${col}">${label}</span>
      <span class="c-name">${t.name}</span>
      ${blocked?'<span class="c-lock">blocked</span>':''}
    </div>
    <div class="c-meta">
      <span class="c-pill" style="background:var(--bg3);color:var(--tx2)">${TL[t.speed]}</span>
      <span class="c-pill" style="background:${sc.bg};color:${sc.fg}">${SL[t.stakes]}</span>
      ${t.due_label?`<span class="c-date">${t.due_label}</span>`:''}
      ${dd<999?`<span class="c-tp" style="background:${ddColor}">T${dd<=0?'+':'−'}${Math.abs(dd)}</span>`:''}
    </div>
    ${pbar}
    ${done?`<div class="c-done-mark" style="color:${col}">✓</div>`:''}`;

  // Tooltip on hover
  card.addEventListener('mouseenter',e=>showTip(t,e));
  card.addEventListener('mousemove',e=>{const tip=document.getElementById('tip');tip.style.left=(e.clientX+14)+'px';tip.style.top=(e.clientY-10)+'px'});
  card.addEventListener('mouseleave',()=>document.getElementById('tip').classList.remove('show'));

  // Click: toggle done (no-sub tasks), or select
  card.addEventListener('click',()=>{
    state.selectedId=state.selectedId===t.id?null:t.id;
    document.querySelectorAll('.card').forEach(c=>c.classList.toggle('selected',parseInt(c.dataset.tid)===state.selectedId));
    if(!hasSubs&&!blocked){
      fetch(`/api/tasks/${t.id}/toggle`,{method:'PATCH',headers:{'Content-Type':'application/json'}})
        .then(r=>r.json()).then(r=>{t.done=r.done?1:0;loadTasks().then(render)});
    }
  });

  return card;
}

function showTip(t,e){
  const tip=document.getElementById('tip');
  const col=dc(t.domain),done=taskDone(t),blocked=isBlocked(t),prog=taskProgress(t);
  const status=done?'✓ Complete':blocked?'🔒 Blocked':prog>0?`⬡ ${Math.round(prog*100)}% done`:'● Active';
  const needs=(t.needs||[]).map(id=>state.tById[id]?.name).filter(Boolean);
  const unlocks=state.tasks.filter(u=>(u.needs||[]).includes(t.id)).map(u=>u.name);
  tip.innerHTML=`
    <div class="tl-tip-domain" style="color:${col}">${t.domain}</div>
    <div class="tl-tip-name">${t.name}</div>
    <div class="tl-tip-meta">${status}${needs.length?`<br>needs: ${needs.join(', ')}`:''}${unlocks.length?`<br>unlocks: ${unlocks.join(', ')}`:''}${t.due_label?`<br>${t.due_label}`:''}</div>`;
  tip.style.left=(e.clientX+14)+'px';tip.style.top=(e.clientY-10)+'px';
  tip.classList.add('show');
}

// ── Leader Line arrows ────────────────────────────────────────

function drawLines(cardLayout){
  state.tasks.forEach(t=>{
    if(!t.needs||!t.needs.length)return;
    t.needs.forEach(bid=>{
      const src=document.getElementById('card-'+bid);
      const dst=document.getElementById('card-'+t.id);
      if(!src||!dst)return;
      const srcT=state.tById[bid];
      const isDone=srcT&&taskDone(srcT);
      const col=dc(srcT?.domain||t.domain);

      try{
        const ll=new LeaderLine(src,dst,{
          color:col,
          size:isDone?2:1.5,
          opacity:isDone?.7:.38,
          path:'fluid',
          startSocket:'right',
          endSocket:'left',
          endPlug:'arrow2',
          endPlugSize:1.8,
          startPlugOutline:false,
          endPlugOutline:false,
          dash:isDone?false:{len:6,gap:4},
        });
        leaderLines.push(ll);
      }catch(err){/* leader-line may fail if elements off-screen */}
    });
  });

  // Reposition on scroll
  const outer=document.getElementById('tlOuter');
  outer._scrollHandler=()=>leaderLines.forEach(l=>{try{l.position()}catch(e){}});
  outer.removeEventListener('scroll',outer._scrollHandler);
  outer.addEventListener('scroll',outer._scrollHandler);
}

function destroyLines(){
  leaderLines.forEach(l=>{try{l.remove()}catch(e){}});
  leaderLines=[];
}

// ── Legend ────────────────────────────────────────────────────

function renderLegend(){
  const leg=document.getElementById('legend');
  const domains=Object.keys(DM).filter(d=>state.tasks.some(t=>t.domain===d));
  leg.innerHTML=domains.map(d=>`<div class="li"><span class="li-dot" style="background:${dc(d)}"></span>${d}</div>`).join('');
  leg.innerHTML+=`<div class="legend-right">
    <div class="li"><span style="display:inline-block;width:24px;height:1.5px;background:#888;vertical-align:middle;margin-right:4px;opacity:.6;border-top:1px dashed #888"></span>pending dep</div>
    <div class="li"><span style="display:inline-block;width:24px;height:2px;background:#aaa;vertical-align:middle;margin-right:4px"></span>complete dep</div>
    <div class="li" style="color:#ef4444">— today</div>
  </div>`;
}

// ── User toggle ───────────────────────────────────────────────

function renderUserToggle(){
  const el=document.getElementById('userToggle');
  el.innerHTML=state.users.map(u=>`<button class="user-btn${u.slug===state.slug?' active':''}" data-slug="${u.slug}">${u.name}</button>`).join('');
  el.querySelectorAll('.user-btn').forEach(b=>b.addEventListener('click',async()=>{
    state.slug=b.dataset.slug;
    el.querySelectorAll('.user-btn').forEach(x=>x.classList.toggle('active',x.dataset.slug===state.slug));
    await loadTasks();renderLegend();render();
  }));
}

// ── View toggle ───────────────────────────────────────────────

document.querySelectorAll('.view-btn').forEach(b=>b.addEventListener('click',async()=>{
  state.view=b.dataset.view;
  document.querySelectorAll('.view-btn').forEach(x=>x.classList.toggle('active',x.dataset.view===state.view));
  await loadTasks();renderLegend();render();
}));

// ── Init ──────────────────────────────────────────────────────

(async()=>{
  try{
    await loadUsers();
    await loadTasks();
    document.getElementById('loading').style.display='none';
    document.getElementById('app').style.display='flex';
    renderUserToggle();
    renderLegend();
    render();
  }catch(e){
    document.getElementById('loading').textContent='Error: '+e.message;
    console.error(e);
  }
})();
</script>
</body>
</html>
