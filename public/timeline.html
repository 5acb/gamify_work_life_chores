<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timeline — organizer</title>
<style>
  :root{--bg:#0e0e12;--bg2:#17171c;--bg3:#1c1c22;--tx1:#e4e4e7;--tx2:#a1a1aa;--tx3:#71717a;--accent:#0d9488;--brd:rgba(255,255,255,0.08)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Inter',system-ui,sans-serif;background:var(--bg);color:var(--tx1);height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;-webkit-font-smoothing:antialiased}
  .icon{font-size:48px;opacity:.4}
  h1{font-size:20px;font-weight:700;letter-spacing:-.2px}
  p{font-size:13px;color:var(--tx3);line-height:1.6;text-align:center;max-width:320px}
  a{display:inline-flex;align-items:center;gap:6px;margin-top:8px;padding:9px 18px;border-radius:6px;background:var(--bg2);border:1px solid var(--brd);color:var(--tx2);font-size:12px;font-weight:600;text-decoration:none;transition:all .15s}
  a:hover{border-color:var(--accent);color:var(--tx1)}
</style>
</head>
<body>
<div class="icon">◫</div>
<h1>Timeline</h1>
<p>The timeline view is being rebuilt from scratch. Check back soon.</p>
<a href="javascript:history.back()">← Back to board</a>
</body>
</html>
