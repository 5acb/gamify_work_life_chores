<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#111113">
<title>organizer</title>
<style>
:root{--bg:#111113;--bg2:#1c1c1f;--bg3:#26262a;--tx1:#e4e4e7;--tx2:#a1a1aa;--tx3:#71717a;--brd:rgba(255,255,255,0.08)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Inter',sans-serif;background:var(--bg);color:var(--tx1);padding:16px 12px 80px;max-width:640px;margin:0 auto;-webkit-font-smoothing:antialiased}
.hdr{margin-bottom:20px}.hdr h1{font-size:20px;font-weight:700;margin-bottom:4px}.hdr p{font-size:11px;color:var(--tx3)}
.leg{font-size:10px;color:var(--tx3);margin-bottom:16px;line-height:1.7}.leg b{color:var(--tx2)}
.card{position:relative;padding:12px 14px 12px 22px;margin-bottom:10px;border-radius:10px;background:var(--bg2);border:1px solid var(--brd);transition:opacity 0.2s}
.card.alldone{opacity:0.2}.card.alldone .title{text-decoration:line-through}
.stripe{position:absolute;left:0;top:0;bottom:0;width:5px;border-radius:10px 0 0 10px}
.r1{display:flex;align-items:center;gap:8px;margin-bottom:8px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.idx{font-size:11px;color:var(--tx3);font-weight:700;min-width:16px;text-align:right;font-variant-numeric:tabular-nums}
.dtag{font-size:8px;font-weight:800;letter-spacing:0.8px;text-transform:uppercase;padding:2px 7px;border-radius:4px;border:1.5px solid;background:transparent}
.title{font-size:14px;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.lock-badge{font-size:8px;font-weight:700;padding:2px 6px;border-radius:4px;background:var(--bg3);color:var(--tx3);text-transform:uppercase;letter-spacing:0.5px}
.chevron{font-size:10px;color:var(--tx3);transition:transform 0.2s;flex-shrink:0}.chevron.open{transform:rotate(90deg)}
.r2{display:flex;align-items:center;gap:5px;flex-wrap:wrap;cursor:pointer;-webkit-tap-highlight-color:transparent}
.pill{font-size:8px;font-weight:700;padding:2px 7px;border-radius:4px;text-transform:uppercase;letter-spacing:0.4px}
.p-turn{background:var(--bg3);color:var(--tx2)}
.dates{font-size:10px;color:var(--tx2);white-space:nowrap}.arrow{color:var(--tx3);margin:0 2px}
.buf{display:flex;align-items:center;gap:3px;margin-left:auto;flex-shrink:0}
.tp{font-size:9px;font-weight:700;padding:2px 7px;border-radius:5px;color:#fff}
.bd{width:4px;height:4px;border-radius:50%;display:inline-block}
.pbar-wrap{height:3px;background:var(--bg3);border-radius:2px;margin-top:8px;overflow:hidden}
.pbar{height:100%;border-radius:2px;transition:width 0.3s}
.dep-note{font-size:9px;color:var(--tx3);margin-top:6px;font-style:italic}
.subs{margin-top:10px;padding-top:10px;border-top:1px solid var(--brd)}
.sub{display:flex;align-items:flex-start;gap:10px;padding:6px 0;cursor:pointer;-webkit-tap-highlight-color:transparent}
.sub.subdone .slabel{text-decoration:line-through;color:var(--tx3)}
.scheck{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--tx3);flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all 0.15s}
.scheck.on{background:#0d9488;border-color:#0d9488}
.scheck.on::after{content:'';width:5px;height:9px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg);margin-top:-2px}
.slabel{font-size:12px;color:var(--tx1);line-height:1.5}
</style>
</head>
<body>
<div class="hdr">
  <h1>organizer</h1>
  <p id="datestr"></p>
</div>
<div class="leg"><b>Speed</b> snap · sesh · grind &nbsp; <b>Stakes</b> low · high · crit</div>
<div id="app"><p style="color:var(--tx3);font-size:13px">Loading...</p></div>
<script>
var TODAY=new Date();TODAY.setHours(0,0,0,0);
document.getElementById('datestr').textContent=TODAY.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});

var DM={CTI:{c:"#60a5fa"},ECM:{c:"#c084fc"},CSD:{c:"#5eead4"},GRA:{c:"#7dd3fc"},Personal:{c:"#a5b4fc"}};
var TL=["snap","sesh","grind"];
var SL=["low","high","crit"];
var SC=[{bg:"var(--bg3)",fg:"var(--tx3)"},{bg:"#C9652A",fg:"#fff"},{bg:"#D92B2B",fg:"#fff"}];

var tasks=[];
var taskById={};
var expanded=new Set();

function api(method,url,body){
  var opts={method:method,headers:{'Content-Type':'application/json'}};
  if(body) opts.body=JSON.stringify(body);
  return fetch(url,opts).then(function(r){return r.json()});
}

function load(){
  Promise.all([api('GET','/api/tasks'),api('GET','/api/ui-state')]).then(function(res){
    tasks=res[0].tasks;
    taskById={};
    tasks.forEach(function(t){taskById[t.id]=t});
    if(res[1].expanded) res[1].expanded.forEach(function(i){expanded.add(i)});
    autoExpand();
    render();
  });
}

function saveExpanded(){
  api('PUT','/api/ui-state',{expanded:Array.from(expanded)});
}

function df(dateStr){
  if(!dateStr) return 999;
  var d=new Date(dateStr+'T00:00:00');
  return Math.max(0,Math.round((d-TODAY)/864e5));
}
function bf(p,x){
  if(!p||!x) return 0;
  return Math.max(0,Math.round((new Date(x+'T00:00:00')-new Date(p+'T00:00:00'))/864e5));
}
function uc(n){return n<=0?"#ef4444":n<=2?"#C9652A":n<=5?"#A67A4B":"#71717a"}
function bc(b){return b<=1?"#C9652A":b<=3?"#A67A4B":"#71717a"}

function isBlocked(t){
  if(!t.needs||!t.needs.length) return false;
  for(var k=0;k<t.needs.length;k++){
    var dep=taskById[t.needs[k]];
    if(!dep) continue;
    if(dep.subs&&dep.subs.length){if(!dep.subs.every(function(s){return s.done})) return true;}
    else{if(!dep.done) return true;}
  }
  return false;
}
function taskDone(t){
  var allSubs;
  if(t.subs&&t.subs.length) allSubs=t.subs.every(function(s){return s.done});
  else allSubs=!!t.done;
  return allSubs && !isBlocked(t);
}
function taskProgress(t){
  if(!t.subs||!t.subs.length) return t.done?1:0;
  return t.subs.filter(function(s){return s.done}).length/t.subs.length;
}

function autoExpand(){
  tasks.forEach(function(t){
    if(!t.subs||!t.subs.length) return;
    if(df(t.plan_date)<=2 && !taskDone(t)) expanded.add(t.id);
  });
}

var app=document.getElementById('app');

function render(){
  app.innerHTML='';
  tasks.forEach(function(t,idx){
    var dp=df(t.plan_date),dd=df(t.due_date),b=bf(t.plan_date,t.due_date);
    var col=(DM[t.domain]||{c:"#71717a"}).c;
    var label=t.domain==="Personal"?"PER":t.domain;
    var sc=SC[t.stakes]||SC[0];
    var blocked=isBlocked(t);
    var done=taskDone(t);
    var prog=taskProgress(t);
    var dots='';var bcc=bc(b);
    for(var j=0;j<Math.min(b,7);j++) dots+='<span class="bd" style="background:'+bcc+'"></span>';

    var el=document.createElement('div');
    el.className='card'+(done?' alldone':'');

    var blockerNames='';
    if(blocked&&t.needs) blockerNames=t.needs.map(function(ni){var d=taskById[ni];return d?d.name:'?'}).join(', ');

    var hasSubs=t.subs&&t.subs.length>0;
    var isOpen=expanded.has(t.id);
    var chevron=hasSubs?'<span class="chevron'+(isOpen?' open':'')+'">&#9654;</span>':'';

    var subsHTML='';
    if(hasSubs&&isOpen){
      subsHTML='<div class="subs">';
      t.subs.forEach(function(s){
        subsHTML+='<div class="sub'+(s.done?' subdone':'')+'" data-sid="'+s.id+'">'
          +'<div class="scheck'+(s.done?' on':'')+'"></div>'
          +'<span class="slabel">'+s.label+'</span></div>';
      });
      subsHTML+='</div>';
    }

    var pbarHTML='';
    if(hasSubs) pbarHTML='<div class="pbar-wrap"><div class="pbar" style="width:'+Math.round(prog*100)+'%;background:'+col+'"></div></div>';

    var lockHTML='';
    if(blocked){
      var allSubsDone=hasSubs?t.subs.every(function(s){return s.done}):!!t.done;
      lockHTML='<div class="dep-note">'+(allSubsDone?'All prep done — waiting on: ':'Completion blocked by: ')+blockerNames+'</div>';
    }

    el.innerHTML=
      '<div class="stripe" style="background:'+col+'"></div>'
      +'<div class="r1" data-tid="'+t.id+'">'
        +'<span class="idx">'+(idx+1)+'</span>'
        +'<span class="dtag" style="color:'+col+';border-color:'+col+'">'+label+'</span>'
        +'<span class="title">'+t.name+'</span>'
        +(blocked?'<span class="lock-badge">blocked</span>':'')
        +chevron
      +'</div>'
      +'<div class="r2" data-tid="'+t.id+'">'
        +'<span class="pill p-turn">'+TL[t.speed]+'</span>'
        +'<span class="pill" style="background:'+sc.bg+';color:'+sc.fg+'">'+SL[t.stakes]+'</span>'
        +'<span class="dates">'+(t.plan_label||'')+'<span class="arrow"> → </span>'+(t.due_label||'')+'</span>'
        +'<span class="buf">'
          +'<span class="tp" style="background:'+uc(dp)+'">T-'+dp+'</span>'
          +dots
          +'<span class="tp" style="background:'+uc(dd)+'">T-'+dd+'</span>'
        +'</span>'
      +'</div>'
      +pbarHTML+lockHTML+subsHTML;
    app.appendChild(el);
  });

  document.querySelectorAll('[data-tid]').forEach(function(el){
    el.addEventListener('click',function(){
      var tid=parseInt(this.getAttribute('data-tid'));
      var t=taskById[tid];
      if(t.subs&&t.subs.length){
        expanded.has(tid)?expanded.delete(tid):expanded.add(tid);
        saveExpanded();
      } else {
        api('PATCH','/api/tasks/'+tid+'/toggle').then(function(r){t.done=r.done?1:0;render()});
      }
      render();
    });
  });

  document.querySelectorAll('[data-sid]').forEach(function(el){
    el.addEventListener('click',function(e){
      e.stopPropagation();
      var sid=parseInt(this.getAttribute('data-sid'));
      api('PATCH','/api/subtasks/'+sid+'/toggle').then(function(r){
        for(var i=0;i<tasks.length;i++){
          var subs=tasks[i].subs;
          if(!subs) continue;
          for(var j=0;j<subs.length;j++){
            if(subs[j].id===sid){subs[j].done=r.done?1:0;render();return}
          }
        }
      });
    });
  });
}

load();
</script>
</body>
</html>
