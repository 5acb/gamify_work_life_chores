<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a0c">
<title>organizer</title>
<style>
:root{--bg:#0a0a0c;--bg2:#131316;--bg3:#1c1c20;--bg4:#26262b;--tx1:#e4e4e7;--tx2:#a1a1aa;--tx3:#5a5a65;--brd:rgba(255,255,255,0.06);--accent:#0d9488;--glow:0 0 12px rgba(13,148,136,0.4)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Inter',system-ui,sans-serif;background:var(--bg);color:var(--tx1);overflow:hidden;height:100vh;-webkit-font-smoothing:antialiased}

/* Layout */
.app{display:flex;height:100vh;width:100vw}
.panel-list{width:38%;min-width:300px;height:100vh;display:flex;flex-direction:column;border-right:1px solid var(--brd);background:var(--bg)}
.panel-tree{flex:1;height:100vh;position:relative;background:var(--bg);overflow:hidden}

/* Header */
.hdr{padding:14px 14px 10px;border-bottom:1px solid var(--brd);flex-shrink:0}
.hdr-top{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.hdr h1{font-size:17px;font-weight:700;flex:1}
.hdr .back{font-size:12px;color:var(--tx3);text-decoration:none}
.hdr p{font-size:10px;color:var(--tx3);margin-bottom:8px}
.toggle-wrap{display:flex;background:var(--bg3);border-radius:6px;padding:2px}
.toggle-btn{flex:1;padding:5px 0;text-align:center;font-size:10px;font-weight:600;color:var(--tx3);border-radius:4px;cursor:pointer;border:none;background:transparent;transition:all .15s}
.toggle-btn.active{background:var(--bg4);color:var(--tx1)}
.search{width:100%;padding:7px 10px;border-radius:6px;border:1px solid var(--brd);background:var(--bg2);color:var(--tx1);font-size:12px;outline:none;margin:10px 0 0}
.search::placeholder{color:var(--tx3)}.search:focus{border-color:var(--accent)}

/* Card list */
.cards{flex:1;overflow-y:auto;padding:8px 10px 80px;scrollbar-width:thin;scrollbar-color:var(--bg4) transparent}
.card{position:relative;padding:10px 12px 10px 18px;margin-bottom:6px;border-radius:8px;background:var(--bg2);border:1px solid var(--brd);cursor:pointer;transition:all .15s}
.card:hover{border-color:rgba(255,255,255,0.12)}
.card.selected{border-color:var(--accent);box-shadow:var(--glow)}
.card.alldone{opacity:0.2}.card.alldone .c-name{text-decoration:line-through}
.card.blocked-card{opacity:0.4}
.stripe{position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:8px 0 0 8px}
.c-row{display:flex;align-items:center;gap:6px}
.c-idx{font-size:9px;color:var(--tx3);font-weight:700;min-width:14px;text-align:right;font-variant-numeric:tabular-nums}
.c-domain{font-size:7px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;padding:1px 5px;border-radius:3px;border:1.5px solid}
.c-name{font-size:12px;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.2}
.c-lock{font-size:7px;font-weight:700;padding:1px 4px;border-radius:3px;background:var(--bg3);color:var(--tx3);text-transform:uppercase;letter-spacing:.3px}
.c-meta{display:flex;align-items:center;gap:4px;margin-top:5px;flex-wrap:wrap}
.c-pill{font-size:7px;font-weight:700;padding:1px 5px;border-radius:3px;text-transform:uppercase;letter-spacing:.3px}
.c-date{font-size:9px;color:var(--tx2);white-space:nowrap}
.c-tp{font-size:8px;font-weight:700;padding:1px 5px;border-radius:4px;color:#fff}
.c-pbar{height:2px;background:var(--bg3);border-radius:1px;margin-top:6px;overflow:hidden}
.c-pbar-fill{height:100%;border-radius:1px;transition:width .3s}
.c-subs{margin-top:6px;padding-top:6px;border-top:1px solid var(--brd)}
.c-sub{display:flex;align-items:flex-start;gap:8px;padding:3px 0;cursor:pointer}
.c-sub.subdone .c-slabel{text-decoration:line-through;color:var(--tx3)}
.c-scheck{width:14px;height:14px;border-radius:4px;border:1.5px solid var(--tx3);flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all .15s}
.c-scheck.on{background:var(--accent);border-color:var(--accent)}
.c-scheck.on::after{content:'';width:4px;height:7px;border:solid #fff;border-width:0 1.5px 1.5px 0;transform:rotate(45deg);margin-top:-1px}
.c-slabel{font-size:10px;color:var(--tx1);line-height:1.4;flex:1}
.c-sub-del{font-size:9px;color:var(--tx3);cursor:pointer;opacity:0;transition:opacity .15s;padding:0 2px}
.c-sub:hover .c-sub-del{opacity:.5}
.c-sub-del:hover{opacity:1!important;color:#ef4444}
.c-add-sub{display:flex;gap:4px;margin-top:4px}
.c-add-sub input{flex:1;padding:4px 6px;border-radius:4px;border:1px solid var(--brd);background:var(--bg3);color:var(--tx1);font-size:10px;outline:none}
.c-add-sub button{padding:4px 8px;border-radius:4px;border:none;background:var(--accent);color:#fff;font-size:10px;font-weight:600;cursor:pointer}
.c-actions{display:flex;gap:4px;margin-top:6px}
.c-act{font-size:8px;font-weight:600;padding:2px 6px;border-radius:4px;border:1px solid var(--brd);background:transparent;color:var(--tx3);cursor:pointer}
.c-act:hover{background:var(--bg3);color:var(--tx2)}
.c-act.archive{color:#ef4444;border-color:rgba(239,68,68,.3)}
.c-act.unarchive{color:var(--accent);border-color:rgba(13,148,136,.3)}

/* FAB */
.fab{position:fixed;bottom:20px;left:calc(38% / 2 - 22px);width:44px;height:44px;border-radius:50%;background:var(--accent);color:#fff;font-size:22px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(0,0,0,.5);z-index:50}

/* Tree SVG */
.tree-svg{width:100%;height:100%}
.tree-node{cursor:pointer;transition:opacity .2s}
.tree-node:hover .node-ring{stroke-width:3}
.tree-edge{stroke-linecap:round}

/* Tree legend */
.tree-legend{position:absolute;bottom:14px;left:14px;display:flex;gap:10px;flex-wrap:wrap}
.tree-legend-item{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--tx3);font-weight:600;letter-spacing:.3px;text-transform:uppercase}
.tree-legend-dot{width:8px;height:8px;border-radius:50%}

/* Tree hover tooltip */
.tree-tooltip{position:absolute;pointer-events:none;background:var(--bg2);border:1px solid var(--brd);border-radius:6px;padding:8px 10px;font-size:11px;color:var(--tx1);max-width:200px;opacity:0;transition:opacity .1s;z-index:20}
.tree-tooltip.show{opacity:1}
.tree-tooltip .tt-domain{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.tree-tooltip .tt-name{font-weight:600}
.tree-tooltip .tt-status{font-size:9px;color:var(--tx3);margin-top:2px}

/* Modal */
.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:100;display:none;align-items:center;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:var(--bg2);border-radius:12px;padding:20px 16px;width:90%;max-width:400px;max-height:80vh;overflow-y:auto;border:1px solid var(--brd)}
.modal h2{font-size:15px;font-weight:700;margin-bottom:14px}
.field{margin-bottom:10px}
.field label{display:block;font-size:9px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.field input,.field select{width:100%;padding:7px 9px;border-radius:5px;border:1px solid var(--brd);background:var(--bg3);color:var(--tx1);font-size:12px;outline:none}
.modal-actions{display:flex;gap:6px;margin-top:14px}
.modal-actions button{flex:1;padding:9px;border-radius:6px;border:none;font-size:12px;font-weight:600;cursor:pointer}
.btn-save{background:var(--accent);color:#fff}.btn-cancel{background:var(--bg3);color:var(--tx2)}

/* Picker */
.picker{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:14px;padding:20px;width:100%}
.picker h1{font-size:22px;font-weight:700;margin-bottom:4px}
.picker-card{width:100%;max-width:260px;padding:16px;border-radius:10px;background:var(--bg2);border:1px solid var(--brd);cursor:pointer;text-align:center;transition:border-color .2s}
.picker-card:hover{border-color:var(--accent)}
.picker-card h2{font-size:16px;font-weight:600;margin-bottom:2px}
.picker-card p{font-size:11px;color:var(--tx3)}

.empty{color:var(--tx3);font-size:12px;padding:16px 0}

/* Mobile */
@media(max-width:768px){
  .app{flex-direction:column}
  .panel-list{width:100%;height:50vh;min-width:unset;border-right:none;border-bottom:1px solid var(--brd)}
  .panel-tree{height:50vh}
  .fab{left:calc(50% - 22px);bottom:calc(50vh + 16px)}
}
</style>
</head>
<body>
<div class="app" id="root"></div>
<div class="modal-bg" id="modalBg"><div class="modal" id="modal"></div></div>
<div class="tree-tooltip" id="tooltip"></div>
<script>
var TODAY=new Date();TODAY.setHours(0,0,0,0);
var DM={CTI:{c:"#60a5fa",l:"CTI"},ECM:{c:"#c084fc",l:"ECM"},CSD:{c:"#5eead4",l:"CSD"},GRA:{c:"#7dd3fc",l:"GRA"},Personal:{c:"#a5b4fc",l:"PER"}};
var TL=["snap","sesh","grind"],SL=["low","high","crit"];
var SC=[{bg:"var(--bg3)",fg:"var(--tx3)"},{bg:"#C9652A",fg:"#fff"},{bg:"#D92B2B",fg:"#fff"}];
var DOMAINS=Object.keys(DM);
var state={slug:null,user:null,tasks:[],taskById:{},expanded:new Set(),view:'current',searchQuery:'',selectedId:null};

function api(m,u,b){var o={method:m,headers:{'Content-Type':'application/json'}};if(b)o.body=JSON.stringify(b);return fetch(u,o).then(function(r){return r.json()})}
function df(ds){if(!ds)return 999;return Math.max(0,Math.round((new Date(ds+'T00:00:00')-TODAY)/864e5))}
function isBlocked(t){
  if(!t.needs||!t.needs.length)return false;
  for(var k=0;k<t.needs.length;k++){var dep=state.taskById[t.needs[k]];if(!dep)continue;
    if(dep.subs&&dep.subs.length){if(!dep.subs.every(function(s){return s.done}))return true}
    else{if(!dep.done)return true}}return false;
}
function taskDone(t){var a;if(t.subs&&t.subs.length)a=t.subs.every(function(s){return s.done});else a=!!t.done;return a&&!isBlocked(t)}
function taskProgress(t){if(!t.subs||!t.subs.length)return t.done?1:0;return t.subs.filter(function(s){return s.done}).length/t.subs.length}
function matchSearch(t){
  if(!state.searchQuery)return true;var q=state.searchQuery.toLowerCase();
  return t.name.toLowerCase().includes(q)||t.domain.toLowerCase().includes(q)||(t.subs&&t.subs.some(function(s){return s.label.toLowerCase().includes(q)}));
}
function saveExpanded(){api('PUT','/api/users/'+state.slug+'/ui-state',{expanded:Array.from(state.expanded)})}

// ---- Routing ----
function getSlug(){var p=location.pathname.replace(/^\//,'').replace(/\/$/,'');return p||null}
function navigate(s){history.pushState(null,'','/'+s);state.slug=s;loadBoard()}
window.addEventListener('popstate',route);
function route(){state.slug=getSlug();if(!state.slug)showPicker();else loadBoard()}

function showPicker(){
  api('GET','/api/users').then(function(d){
    document.getElementById('root').innerHTML='<div class="picker"><h1>organizer</h1></div>';
    var pk=document.querySelector('.picker');
    d.users.forEach(function(u){
      var c=document.createElement('div');c.className='picker-card';
      c.innerHTML='<h2>'+u.name+'</h2><p>@'+u.slug+'</p>';
      c.onclick=function(){navigate(u.slug)};pk.appendChild(c);
    });
  });
}

function loadBoard(){
  var vp=state.view==='archived'?'?view=archived':'';
  Promise.all([api('GET','/api/users/'+state.slug+'/tasks'+vp),api('GET','/api/users/'+state.slug+'/ui-state')]).then(function(res){
    state.tasks=res[0].tasks;state.user=res[0].user;
    state.taskById={};state.tasks.forEach(function(t){state.taskById[t.id]=t});
    state.expanded=new Set();
    if(res[1].expanded)res[1].expanded.forEach(function(i){state.expanded.add(i)});
    renderApp();
  });
}

function renderApp(){
  var root=document.getElementById('root');
  var dateStr=TODAY.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
  root.innerHTML=
    '<div class="panel-list">'
      +'<div class="hdr">'
        +'<div class="hdr-top"><a class="back" href="/" onclick="event.preventDefault();history.pushState(null,\'\',\'/\');route()">&#8592;</a><h1>'+(state.user?state.user.name:'')+'</h1></div>'
        +'<p>'+dateStr+'</p>'
        +'<div class="toggle-wrap">'
          +'<button class="toggle-btn'+(state.view==='current'?' active':'')+'" data-view="current">current</button>'
          +'<button class="toggle-btn'+(state.view==='archived'?' active':'')+'" data-view="archived">archived</button>'
        +'</div>'
        +'<input class="search" id="searchInput" placeholder="Search..." autocomplete="off">'
      +'</div>'
      +'<div class="cards" id="cardList"></div>'
    +'</div>'
    +'<div class="panel-tree" id="treePanel"></div>'
    +'<button class="fab" id="fabAdd">+</button>';

  document.querySelectorAll('[data-view]').forEach(function(b){b.addEventListener('click',function(){state.view=this.getAttribute('data-view');loadBoard()})});
  document.getElementById('searchInput').addEventListener('input',function(){state.searchQuery=this.value;renderCards()});
  document.getElementById('fabAdd').addEventListener('click',openAddTask);
  renderCards();
  renderTree();
}

// ---- Cards (left panel) ----
function renderCards(){
  var list=document.getElementById('cardList');
  var filtered=state.tasks.filter(matchSearch);
  if(!filtered.length){list.innerHTML='<p class="empty">'+(state.searchQuery?'No matches':'No tasks')+'</p>';return}
  list.innerHTML='';
  filtered.forEach(function(t,idx){
    var col=(DM[t.domain]||{c:"#71717a"}).c;
    var label=DM[t.domain]?DM[t.domain].l:t.domain;
    var blocked=isBlocked(t);var done=taskDone(t);var prog=taskProgress(t);
    var dd=df(t.due_date);var sc=SC[t.stakes]||SC[0];
    var hasSubs=t.subs&&t.subs.length>0;
    var isOpen=state.expanded.has(t.id);

    var el=document.createElement('div');
    el.className='card'+(done?' alldone':'')+(blocked?' blocked-card':'')+(state.selectedId===t.id?' selected':'');
    el.setAttribute('data-cardid',t.id);

    var subsHTML='';
    if(hasSubs&&isOpen){
      subsHTML='<div class="c-subs">';
      t.subs.forEach(function(s){
        subsHTML+='<div class="c-sub'+(s.done?' subdone':'')+'" data-sid="'+s.id+'"><div class="c-scheck'+(s.done?' on':'')+'"></div><span class="c-slabel">'+s.label+'</span><span class="c-sub-del" data-delsub="'+s.id+'">&#10005;</span></div>';
      });
      subsHTML+='<div class="c-add-sub"><input placeholder="Add subtask..." data-addsub="'+t.id+'"><button data-addbtn="'+t.id+'">+</button></div></div>';
    }

    var pbar=hasSubs?'<div class="c-pbar"><div class="c-pbar-fill" style="width:'+Math.round(prog*100)+'%;background:'+col+'"></div></div>':'';

    var actHTML='<div class="c-actions"><button class="c-act" data-edit="'+t.id+'">edit</button>';
    if(!hasSubs)actHTML+='<button class="c-act" data-addfirstsub="'+t.id+'">+sub</button>';
    if(t.archived)actHTML+='<button class="c-act unarchive" data-unarchive="'+t.id+'">unarchive</button>';
    else if(done)actHTML+='<button class="c-act archive" data-archive="'+t.id+'">archive</button>';
    actHTML+='</div>';

    el.innerHTML=
      '<div class="stripe" style="background:'+col+'"></div>'
      +'<div class="c-row"><span class="c-idx">'+(idx+1)+'</span><span class="c-domain" style="color:'+col+';border-color:'+col+'">'+label+'</span><span class="c-name">'+t.name+'</span>'+(blocked?'<span class="c-lock">blocked</span>':'')+'</div>'
      +'<div class="c-meta"><span class="c-pill" style="background:var(--bg3);color:var(--tx2)">'+TL[t.speed]+'</span><span class="c-pill" style="background:'+sc.bg+';color:'+sc.fg+'">'+SL[t.stakes]+'</span><span class="c-date">'+(t.due_label||'')+'</span><span class="c-tp" style="background:'+(dd<=0?"#ef4444":dd<=2?"#C9652A":dd<=5?"#A67A4B":"#3f3f46")+'">T-'+dd+'</span></div>'
      +pbar+actHTML+subsHTML;
    list.appendChild(el);
  });
  bindCardEvents();
}

function selectTask(id){
  state.selectedId=id;
  document.querySelectorAll('.card').forEach(function(c){c.classList.toggle('selected',parseInt(c.getAttribute('data-cardid'))===id)});
  // Highlight in tree
  document.querySelectorAll('.tree-node').forEach(function(n){
    var nid=parseInt(n.getAttribute('data-nid'));
    n.querySelector('.node-ring').style.strokeWidth=nid===id?'3':'1.5';
  });
  // Scroll card into view
  var card=document.querySelector('[data-cardid="'+id+'"]');
  if(card)card.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function bindCardEvents(){
  document.querySelectorAll('.card').forEach(function(el){el.addEventListener('click',function(e){
    if(e.target.closest('[data-sid]')||e.target.closest('[data-edit]')||e.target.closest('[data-archive]')||e.target.closest('[data-unarchive]')||e.target.closest('[data-delsub]')||e.target.closest('[data-addbtn]')||e.target.closest('[data-addfirstsub]')||e.target.closest('[data-addsub]'))return;
    var tid=parseInt(this.getAttribute('data-cardid'));var t=state.taskById[tid];
    selectTask(tid);
    if(t.subs&&t.subs.length){state.expanded.has(tid)?state.expanded.delete(tid):state.expanded.add(tid);saveExpanded();renderCards();selectTask(tid)}
    else{api('PATCH','/api/tasks/'+tid+'/toggle').then(function(r){t.done=r.done?1:0;renderCards();renderTree()})}
  })});
  document.querySelectorAll('[data-sid]').forEach(function(el){el.addEventListener('click',function(e){
    e.stopPropagation();var sid=parseInt(this.getAttribute('data-sid'));
    api('PATCH','/api/subtasks/'+sid+'/toggle').then(function(r){
      for(var i=0;i<state.tasks.length;i++){var subs=state.tasks[i].subs;if(!subs)continue;for(var j=0;j<subs.length;j++){if(subs[j].id===sid){subs[j].done=r.done?1:0;renderCards();renderTree();return}}}
    });
  })});
  document.querySelectorAll('[data-edit]').forEach(function(el){el.addEventListener('click',function(e){e.stopPropagation();openEdit(parseInt(this.getAttribute('data-edit')))})});
  document.querySelectorAll('[data-archive]').forEach(function(el){el.addEventListener('click',function(e){e.stopPropagation();api('PATCH','/api/tasks/'+this.getAttribute('data-archive')+'/archive').then(function(){loadBoard()})})});
  document.querySelectorAll('[data-unarchive]').forEach(function(el){el.addEventListener('click',function(e){e.stopPropagation();api('PATCH','/api/tasks/'+this.getAttribute('data-unarchive')+'/unarchive').then(function(){loadBoard()})})});
  document.querySelectorAll('[data-delsub]').forEach(function(el){el.addEventListener('click',function(e){e.stopPropagation();api('DELETE','/api/subtasks/'+this.getAttribute('data-delsub')).then(function(){loadBoard()})})});
  document.querySelectorAll('[data-addbtn]').forEach(function(b){b.addEventListener('click',function(e){
    e.stopPropagation();var tid=this.getAttribute('data-addbtn');var inp=document.querySelector('[data-addsub="'+tid+'"]');
    if(!inp||!inp.value.trim())return;api('POST','/api/tasks/'+tid+'/subtasks',{label:inp.value.trim()}).then(function(){loadBoard()});
  })});
  document.querySelectorAll('[data-addsub]').forEach(function(inp){inp.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();var b=document.querySelector('[data-addbtn="'+this.getAttribute('data-addsub')+'"]');if(b)b.click()}})});
  document.querySelectorAll('[data-addfirstsub]').forEach(function(el){el.addEventListener('click',function(e){e.stopPropagation();state.expanded.add(parseInt(this.getAttribute('data-addfirstsub')));renderCards()})});
}

// ---- Skill Tree (right panel) ----
function renderTree(){
  var panel=document.getElementById('treePanel');
  if(!panel)return;
  var W=panel.clientWidth,H=panel.clientHeight;
  var cx=W/2,cy=H/2;
  var ringR=Math.min(W,H)*0.16;

  // Build adjacency: who does each task block?
  var blocksMap={};// blocksMap[id] = [ids that depend on id]
  var blockedByMap={};// blockedByMap[id] = [ids that block id]
  state.tasks.forEach(function(t){blocksMap[t.id]=[];blockedByMap[t.id]=[]});
  state.tasks.forEach(function(t){
    if(!t.needs)return;
    t.needs.forEach(function(bid){
      if(blocksMap[bid])blocksMap[bid].push(t.id);
      blockedByMap[t.id].push(bid);
    });
  });

  // Group by domain
  var domainGroups={};DOMAINS.forEach(function(d){domainGroups[d]=[]});
  state.tasks.forEach(function(t){if(domainGroups[t.domain])domainGroups[t.domain].push(t)});

  // Assign angles: each domain gets a wedge
  var activeDomains=DOMAINS.filter(function(d){return domainGroups[d].length>0});
  var totalTasks=state.tasks.length||1;
  var angleOffset=-Math.PI/2;// start from top

  // Compute depth: 0 = root (no blockers in this domain context), deeper = more deps
  var depthMap={};
  function getDepth(id,visited){
    if(depthMap[id]!==undefined)return depthMap[id];
    if(!visited)visited={};
    if(visited[id])return 0;
    visited[id]=true;
    var maxD=0;
    blockedByMap[id].forEach(function(bid){maxD=Math.max(maxD,getDepth(bid,visited)+1)});
    depthMap[id]=maxD;
    return maxD;
  }
  state.tasks.forEach(function(t){getDepth(t.id)});

  var maxDepth=0;
  state.tasks.forEach(function(t){if(depthMap[t.id]>maxDepth)maxDepth=depthMap[t.id]});

  // Position nodes
  var nodePos={};
  var currentAngle=angleOffset;
  var layerSpacing=Math.min(W,H)*0.1;

  activeDomains.forEach(function(dom){
    var tasks=domainGroups[dom];
    var wedgeSize=(tasks.length/totalTasks)*Math.PI*2;
    var startAngle=currentAngle;

    // Sort by depth then sort_order
    tasks.sort(function(a,b){return depthMap[a.id]-depthMap[b.id]||a.sort_order-b.sort_order});

    tasks.forEach(function(t,i){
      var depth=depthMap[t.id];
      var r=ringR+30+depth*layerSpacing;
      var angleInWedge=startAngle+(i+0.5)*(wedgeSize/tasks.length);
      // Add slight jitter for overlapping depths
      var jitter=(depth%2===0?1:-1)*5*Math.sin(i*1.7);
      nodePos[t.id]={
        x:cx+Math.cos(angleInWedge)*(r+jitter),
        y:cy+Math.sin(angleInWedge)*(r+jitter),
        angle:angleInWedge
      };
    });
    currentAngle+=wedgeSize;
  });

  // Build SVG
  var svg='<svg class="tree-svg" viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg">';

  // Defs: glows
  svg+='<defs>';
  DOMAINS.forEach(function(d){
    var c=DM[d].c;
    svg+='<filter id="glow-'+d+'" x="-50%" y="-50%" width="200%" height="200%">'
      +'<feGaussianBlur stdDeviation="4" result="blur"/>'
      +'<feFlood flood-color="'+c+'" flood-opacity="0.6" result="color"/>'
      +'<feComposite in="color" in2="blur" operator="in" result="shadow"/>'
      +'<feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>'
      +'</filter>';
  });
  svg+='<filter id="glow-locked" x="-50%" y="-50%" width="200%" height="200%">'
    +'<feGaussianBlur stdDeviation="2" result="blur"/>'
    +'<feFlood flood-color="#fff" flood-opacity="0.1" result="color"/>'
    +'<feComposite in="color" in2="blur" operator="in" result="shadow"/>'
    +'<feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>'
    +'</filter>';
  svg+='</defs>';

  // Central ring segments
  var ringStart=angleOffset;
  activeDomains.forEach(function(dom){
    var wedge=(domainGroups[dom].length/totalTasks)*Math.PI*2;
    var c=DM[dom].c;
    var x1=cx+Math.cos(ringStart)*ringR,y1=cy+Math.sin(ringStart)*ringR;
    var x2=cx+Math.cos(ringStart+wedge)*ringR,y2=cy+Math.sin(ringStart+wedge)*ringR;
    var large=wedge>Math.PI?1:0;
    svg+='<path d="M '+x1+' '+y1+' A '+ringR+' '+ringR+' 0 '+large+' 1 '+x2+' '+y2+'" fill="none" stroke="'+c+'" stroke-width="6" stroke-opacity="0.3"/>';
    // Label on ring
    var mid=ringStart+wedge/2;
    var lx=cx+Math.cos(mid)*(ringR-18),ly=cy+Math.sin(mid)*(ringR-18);
    svg+='<text x="'+lx+'" y="'+ly+'" fill="'+c+'" font-size="8" font-weight="800" text-anchor="middle" dominant-baseline="central" opacity="0.5" letter-spacing="1">'+DM[dom].l+'</text>';
    ringStart+=wedge;
  });

  // Edges
  state.tasks.forEach(function(t){
    if(!t.needs)return;
    t.needs.forEach(function(bid){
      var from=nodePos[bid],to=nodePos[t.id];
      if(!from||!to)return;
      var done=taskDone(state.taskById[bid]);
      var col=done?(DM[state.taskById[bid].domain]||{c:"#333"}).c:'#222';
      var op=done?0.5:0.15;
      svg+='<line class="tree-edge" x1="'+from.x+'" y1="'+from.y+'" x2="'+to.x+'" y2="'+to.y+'" stroke="'+col+'" stroke-width="1.5" stroke-opacity="'+op+'"/>';
    });
  });

  // Nodes
  state.tasks.forEach(function(t){
    var pos=nodePos[t.id];if(!pos)return;
    var col=(DM[t.domain]||{c:"#71717a"}).c;
    var done=taskDone(t);var blocked=isBlocked(t);
    var prog=taskProgress(t);
    var r=done?7:blocked?6:8;
    var op=done?0.25:blocked?0.35:1;
    var filter=done?'filter="url(#glow-'+t.domain+')"':blocked?'filter="url(#glow-locked)"':'filter="url(#glow-'+t.domain+')"';
    var fillOp=done?1:prog>0?prog:0;
    var selected=state.selectedId===t.id;

    svg+='<g class="tree-node" data-nid="'+t.id+'" opacity="'+op+'" '+filter+'>';
    // Progress fill (partial circle)
    if(prog>0&&prog<1&&!done){
      var startA=-Math.PI/2;
      var endA=startA+prog*Math.PI*2;
      var ax1=pos.x+Math.cos(startA)*r,ay1=pos.y+Math.sin(startA)*r;
      var ax2=pos.x+Math.cos(endA)*r,ay2=pos.y+Math.sin(endA)*r;
      var lg=prog>0.5?1:0;
      svg+='<path d="M '+pos.x+' '+pos.y+' L '+ax1+' '+ay1+' A '+r+' '+r+' 0 '+lg+' 1 '+ax2+' '+ay2+' Z" fill="'+col+'" fill-opacity="0.3"/>';
    }
    // Outer ring
    svg+='<circle class="node-ring" cx="'+pos.x+'" cy="'+pos.y+'" r="'+r+'" fill="'+(done?col:'rgba(255,255,255,0.03)')+'" stroke="'+col+'" stroke-width="'+(selected?3:1.5)+'" fill-opacity="'+(done?0.8:0.05)+'"/>';
    // Lock icon for blocked
    if(blocked){
      svg+='<text x="'+pos.x+'" y="'+(pos.y+1)+'" fill="#555" font-size="7" text-anchor="middle" dominant-baseline="central">&#128274;</text>';
    }
    // Short label
    var lbl=t.name.length>12?t.name.substring(0,11)+'…':t.name;
    var tx=pos.x,ty=pos.y+r+10;
    svg+='<text x="'+tx+'" y="'+ty+'" fill="'+col+'" font-size="7" font-weight="600" text-anchor="middle" opacity="'+(done?0.3:blocked?0.4:0.7)+'">'+lbl+'</text>';
    svg+='</g>';
  });

  svg+='</svg>';

  // Legend
  var legend='<div class="tree-legend">';
  activeDomains.forEach(function(d){
    legend+='<div class="tree-legend-item"><span class="tree-legend-dot" style="background:'+DM[d].c+'"></span>'+d+'</div>';
  });
  legend+='</div>';

  panel.innerHTML=svg+legend;

  // Bind tree node events
  document.querySelectorAll('.tree-node').forEach(function(n){
    n.addEventListener('click',function(){
      var id=parseInt(this.getAttribute('data-nid'));
      selectTask(id);
      // Expand in list
      var t=state.taskById[id];
      if(t&&t.subs&&t.subs.length){state.expanded.add(id);saveExpanded();renderCards();selectTask(id)}
    });
    n.addEventListener('mouseenter',function(e){
      var id=parseInt(this.getAttribute('data-nid'));var t=state.taskById[id];if(!t)return;
      var tip=document.getElementById('tooltip');
      var done=taskDone(t);var blocked=isBlocked(t);
      var status=done?'✓ Complete':blocked?'🔒 Blocked':'In progress';
      var prog=taskProgress(t);
      if(prog>0&&prog<1)status+=' ('+Math.round(prog*100)+'%)';
      tip.innerHTML='<div class="tt-domain" style="color:'+(DM[t.domain]||{c:"#999"}).c+'">'+t.domain+'</div><div class="tt-name">'+t.name+'</div><div class="tt-status">'+status+'</div>';
      tip.classList.add('show');
      tip.style.left=(e.clientX+12)+'px';tip.style.top=(e.clientY-10)+'px';
    });
    n.addEventListener('mousemove',function(e){
      var tip=document.getElementById('tooltip');
      tip.style.left=(e.clientX+12)+'px';tip.style.top=(e.clientY-10)+'px';
    });
    n.addEventListener('mouseleave',function(){document.getElementById('tooltip').classList.remove('show')});
  });
}

// Resize handler
window.addEventListener('resize',function(){if(state.slug)renderTree()});

// ---- Modals ----
function openEdit(id){
  var t=state.taskById[id];if(!t)return;var m=document.getElementById('modal');
  m.innerHTML='<h2>Edit task</h2>'
    +'<div class="field"><label>Name</label><input id="e-name" value="'+t.name.replace(/"/g,'&quot;')+'"></div>'
    +'<div class="field"><label>Domain</label><select id="e-domain">'+DOMAINS.map(function(d){return'<option'+(d===t.domain?' selected':'')+'>'+d+'</option>'}).join('')+'</select></div>'
    +'<div style="display:flex;gap:6px"><div class="field" style="flex:1"><label>Plan date</label><input id="e-pdate" type="date" value="'+(t.plan_date||'')+'"></div><div class="field" style="flex:1"><label>Due date</label><input id="e-ddate" type="date" value="'+(t.due_date||'')+'"></div></div>'
    +'<div style="display:flex;gap:6px"><div class="field" style="flex:1"><label>Plan label</label><input id="e-plabel" value="'+(t.plan_label||'').replace(/"/g,'&quot;')+'"></div><div class="field" style="flex:1"><label>Due label</label><input id="e-dlabel" value="'+(t.due_label||'').replace(/"/g,'&quot;')+'"></div></div>'
    +'<div style="display:flex;gap:6px"><div class="field" style="flex:1"><label>Speed</label><select id="e-speed">'+TL.map(function(s,i){return'<option value="'+i+'"'+(i===t.speed?' selected':'')+'>'+s+'</option>'}).join('')+'</select></div><div class="field" style="flex:1"><label>Stakes</label><select id="e-stakes">'+SL.map(function(s,i){return'<option value="'+i+'"'+(i===t.stakes?' selected':'')+'>'+s+'</option>'}).join('')+'</select></div></div>'
    +'<div class="modal-actions"><button class="btn-cancel" id="e-cancel">Cancel</button><button class="btn-save" id="e-save">Save</button></div>';
  document.getElementById('modalBg').classList.add('show');
  document.getElementById('e-cancel').onclick=closeModal;
  document.getElementById('e-save').onclick=function(){
    api('PATCH','/api/tasks/'+id,{name:document.getElementById('e-name').value,domain:document.getElementById('e-domain').value,plan_date:document.getElementById('e-pdate').value||null,due_date:document.getElementById('e-ddate').value||null,plan_label:document.getElementById('e-plabel').value,due_label:document.getElementById('e-dlabel').value,speed:parseInt(document.getElementById('e-speed').value),stakes:parseInt(document.getElementById('e-stakes').value)}).then(function(){closeModal();loadBoard()});
  };
}

function openAddTask(){
  var m=document.getElementById('modal');
  m.innerHTML='<h2>New task</h2>'
    +'<div class="field"><label>Name</label><input id="e-name" placeholder="Task name..."></div>'
    +'<div class="field"><label>Domain</label><select id="e-domain">'+DOMAINS.map(function(d){return'<option>'+d+'</option>'}).join('')+'</select></div>'
    +'<div style="display:flex;gap:6px"><div class="field" style="flex:1"><label>Plan date</label><input id="e-pdate" type="date"></div><div class="field" style="flex:1"><label>Due date</label><input id="e-ddate" type="date"></div></div>'
    +'<div style="display:flex;gap:6px"><div class="field" style="flex:1"><label>Plan label</label><input id="e-plabel" placeholder="e.g. Wed Apr 8"></div><div class="field" style="flex:1"><label>Due label</label><input id="e-dlabel" placeholder="e.g. Fri Apr 10"></div></div>'
    +'<div style="display:flex;gap:6px"><div class="field" style="flex:1"><label>Speed</label><select id="e-speed">'+TL.map(function(s,i){return'<option value="'+i+'">'+s+'</option>'}).join('')+'</select></div><div class="field" style="flex:1"><label>Stakes</label><select id="e-stakes">'+SL.map(function(s,i){return'<option value="'+i+'">'+s+'</option>'}).join('')+'</select></div></div>'
    +'<div class="modal-actions"><button class="btn-cancel" id="e-cancel">Cancel</button><button class="btn-save" id="e-save">Create</button></div>';
  document.getElementById('modalBg').classList.add('show');
  document.getElementById('e-cancel').onclick=closeModal;
  document.getElementById('e-save').onclick=function(){
    var name=document.getElementById('e-name').value.trim();if(!name)return;
    api('POST','/api/users/'+state.slug+'/tasks',{name:name,domain:document.getElementById('e-domain').value,plan_date:document.getElementById('e-pdate').value||null,due_date:document.getElementById('e-ddate').value||null,plan_label:document.getElementById('e-plabel').value,due_label:document.getElementById('e-dlabel').value,speed:parseInt(document.getElementById('e-speed').value),stakes:parseInt(document.getElementById('e-stakes').value)}).then(function(){closeModal();loadBoard()});
  };
}

function closeModal(){document.getElementById('modalBg').classList.remove('show')}
document.getElementById('modalBg').addEventListener('click',function(e){if(e.target===this)closeModal()});

route();
</script>
