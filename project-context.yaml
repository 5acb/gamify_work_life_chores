database_schema:
  users:
    columns: [id, name, slug, created_at]
    notes: "Board owners. slug used for board routing and session identification."
    current_users: ["anas", "pranjali"]
  tasks:
    columns: [id, domain, name, plan_date, due_date, plan_label, due_label, speed, stakes, sort_order, done, archived, archived_at, user_id, created_at, updated_at]
    indexes: [idx_tasks_archived, idx_tasks_domain]
    notes: "domain restricted to VALID_DOMAINS list (CTI, ECM, CSD, GRA, Personal)."
  subtasks:
    columns: [id, task_id, label, done, sort_order, created_at]
    notes: "Checklist items linked to tasks."
  blockers:
    columns: [task_id, blocked_by]
    pk: "(task_id, blocked_by)"
    notes: "DAG for dependency tracking."
  ui_state:
    columns: [key, value]
    notes: "Per-user UI preferences stored as JSON strings."
  task_events:
    columns: [id, task_id, user_id, action, detail, ts]
    indexes: [idx_task_events_task, idx_task_events_user]
    notes: "Audit log for all task mutations."

subagents:
  code_review: "Analyzes code changes for quality and standards"
  security_audit: "Checks for vulnerabilities and security regressions"
  arch_review: "Ensures changes align with the split-file SPA/Express architecture"
  doc_sync: "Keeps project-context.yaml and README.md in sync with code"
  cleanup: "Identifies dead code, large files, and architectural drift"

mcp_server:
  transport: SSE
  port: 3002
  auth: Token-based (MCP_AUTH_TOKEN)
  ai_provider: Gemini 3 Flash Preview (API + CLI)
  memory: Mem0 integration via local/remote endpoint
  changelog: "Tamper-evident JSONL log with cryptographic chaining"
