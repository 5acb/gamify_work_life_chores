# Project Context — gamify_work_life_chores
# Read this file FIRST in any new chat session, then run orientation_commands.
# Last updated: 2026-04-18

project:
  name: gamify_work_life_chores
  domain: 7ay.de
  description: >
    Personal task organizer with dependency tracking, subtasks, progress bars,
    timeline view, multi-user boards, and Gemini AI integration.
    Evolved into an **Atmospheric Sanctuary**—a 2:1 split-pane interface 
    fusing skeuomorphic glass aesthetics with an oceanic palette.
  repo: https://github.com/5acb/gamify_work_life_chores
  infra_repo: https://github.com/5acb/7ay_de_infra (private)

server:
  ip: 164.92.90.91
  provider: DigitalOcean SFO3
  os: Ubuntu 24.04 LTS
  node: v22
  domain: 7ay.de
  ssl: Let's Encrypt (auto-renew)
  deploy_user: deploy

architecture:
  overview: >
    Split-file SPA frontend (index.html shell + style.css + app.js) + Express REST API
    (server.js ~600 lines) + SQLite WAL. No build step, no bundler, no framework.
    Vanilla JS + CSS. Three systemd services (organizer, organizer-mcp, organizer-commit), 
    Nginx reverse proxy. Gemini AI integration via MCP server (McpServer SDK, SSE transport, 
    token auth) using gemini-3-flash-preview. Integrated with Mem0 memory/knowledge base.
  ui_paradigm: >
    Atmospheric Sanctuary. Uses 2:1 split pane (Worktree vs Task List). 
    Features Donut Indicators for temporal frequency and a Sanctuary Indicator Line 
    for global status. Custom reordering via Sortable.js with ui-state persistence.
  ports:
    3000: "App server (Express + SQLite) — proxied by Nginx on /"
    3001: "commit-daemon (socat + bash, localhost-only) — proxied on /api/commit"
    3002: "MCP server (SSE transport, token auth) — proxied on /mcp"
  auth_flow: >
    Modern passwordless-first authentication. Supports WebAuthn (Passkeys) for primary access.
    Fallback authentication uses Argon2-hashed passwords stored in the database.
    Sessions are HMAC-signed (slug.ts.hmac) using a persistent secret in 
    /opt/organizer/data/.session_secret. 30-day expiry.
  security:
    - "Custom session verification with timing-safe HMAC checks"
    - "WebAuthn (Passkeys) for secure, biometric authentication"
    - "Argon2 for robust, salted password hashing in DB"
    - "CSP header: default-src 'self'; script-src 'self' https://cdnjs.cloudflare.com; style-src 'self' 'nonce-<val>'; img-src 'self' data:; connect-src 'self'; font-src 'self'"
    - "Audit logging: task_events table tracks all mutations"
    - "CSRF: X-Requested-With: XMLHttpRequest required on all non-GET requests"
    - "X-Frame-Options: DENY, X-Content-Type-Options: nosniff"
    - "Referrer-Policy: strict-origin-when-cross-origin"
  database:
    engine: SQLite (WAL mode, foreign_keys ON)
    path: /opt/organizer/data/organizer.db
    orm: none — raw SQL via better-sqlite3
    backup: "cron every 7min → sqlite3 .dump → /opt/organizer/data/backups/"

files:
  JOURNEY.md: "Narrative chronicle of the Sanctuary UI evolution"
  README.md: "Main project README"
  DESIGN.md: "Foundational Design Laws for the Sanctuary"
  project-context.yaml: "This documentation file"
  public/app.js: "Frontend JS — routing, Sanctuary rendering, reordering logic, AI chat"
  public/style.css: "Atmospheric Sanctuary styles — glass, material gradients, donuts"
  server.js: "Express API — auth, task persistence, Gemini agent, ui-state management"

database_schema:
  users:
    columns: [id, name, slug, created_at]
    notes: "Board owners."
  tasks:
    columns: [id, domain, name, plan_date, due_date, speed, stakes, sort_order, done, archived, user_id]
    notes: "domain: CTI, ECM, CSD, GRA, Personal. 'Done is Archived' terminal state."
  subtasks:
    columns: [id, task_id, label, done, sort_order]
    notes: "Checklist items. Still exist in DB but UI now promotes them to tasks."
  blockers:
    columns: [task_id, blocked_by]
    notes: "DAG for dependency tracking."
  ui_state:
    columns: [key, value]
    notes: "Per-user preferences. order key used for RHS task order persistence."
  task_events:
    columns: [id, task_id, user_id, action, detail, ts]
    notes: "Audit log for Gemini agent context."

orientation_commands:
  - "cat project-context.yaml"
  - "cat JOURNEY.md"
  - "systemctl status organizer*"
