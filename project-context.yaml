# Project Context — gamify_work_life_chores
# Read this file first in any new chat session.
# Then run the orientation commands below to get live state.

project:
  name: gamify_work_life_chores
  domain: 7ay.de
  description: >
    Personal task organizer with dependency tracking, subtasks, progress bars,
    multi-user boards, and a Watch Dogs-inspired skill tree visualization.
    Built for managing academic deadlines, work tasks, and personal chores.
  repo: https://github.com/5acb/gamify_work_life_chores
  infra_repo: https://github.com/5acb/7ay_de_infra (private)

server:
  ip: 164.92.90.91
  provider: DigitalOcean SFO3
  os: Ubuntu 24.04 LTS
  node: v22
  domain: 7ay.de
  ssl: Let's Encrypt (auto-renew)

architecture:
  overview: >
    Single-file SPA frontend (public/index.html) + Express REST API + SQLite.
    No build step, no bundler, no framework. Vanilla JS + CSS.
  ports:
    3000: "App server (Express + SQLite) — proxied by Nginx"
    3001: "Auto-commit daemon (socat + bash, localhost only)"
    3002: "MCP server (SSE transport, token auth)"
  proxy: "Nginx reverse proxy on 443 with basic auth on all routes except /mcp/*"
  database:
    engine: SQLite (WAL mode)
    path: /opt/organizer/data/organizer.db
    orm: none — raw SQL via better-sqlite3
    backup: "cron every 7min → sqlite3 .dump → local file"

files:
  server.js: "Express API — all routes, DB queries, static file serving"
  public/index.html: "Entire frontend — HTML + CSS + JS in one file (~600 lines)"
  schema.sql: "DB schema (structure only, no seed data in public repo)"
  scripts/backup.sh: "SQLite dump + auto-commit"
  package.json: "deps: express, better-sqlite3"

database_schema:
  users:
    columns: [id, name, slug, created_at]
    notes: "Board owners. Each user gets a board at /:slug"
  tasks:
    columns: [id, user_id, domain, name, plan_date, due_date, plan_label, due_label, speed, stakes, sort_order, done, archived, archived_at, created_at, updated_at]
    notes: >
      Core task items. domain is a category tag (CTI, ECM, CSD, GRA, Personal).
      speed (0=snap, 1=sesh, 2=grind) and stakes (0=low, 1=high, 2=crit) are
      orthogonal difficulty/importance dimensions.
  subtasks:
    columns: [id, task_id, label, done, sort_order, created_at]
    notes: "Checklist items under tasks. Task progress = subtask completion ratio."
  blockers:
    columns: [task_id, blocked_by]
    notes: >
      Dependency edges. task_id is blocked BY blocked_by. A task is considered
      blocked if any of its blockers are incomplete. This forms a DAG used in
      the skill tree visualization.
  ui_state:
    columns: [key, value]
    notes: "Per-user UI preferences (expanded cards, etc). Key format: slug:keyname"

api:
  users:
    - "GET    /api/users                     → list all users"
    - "GET    /api/users/:slug/tasks         → get tasks (?view=archived)"
    - "POST   /api/users/:slug/tasks         → create task"
    - "GET    /api/users/:slug/ui-state      → get UI state"
    - "PUT    /api/users/:slug/ui-state      → save UI state"
  tasks:
    - "PATCH  /api/tasks/:id                 → update fields"
    - "PATCH  /api/tasks/:id/toggle          → toggle done"
    - "PATCH  /api/tasks/:id/archive         → archive"
    - "PATCH  /api/tasks/:id/unarchive       → unarchive"
    - "DELETE /api/tasks/:id                 → delete"
  subtasks:
    - "POST   /api/tasks/:id/subtasks        → add subtask"
    - "PATCH  /api/subtasks/:id              → update label"
    - "PATCH  /api/subtasks/:id/toggle       → toggle done"
    - "DELETE /api/subtasks/:id              → delete"
  blockers:
    - "POST   /api/blockers                  → add (body: task_id, blocked_by)"
    - "DELETE /api/blockers                  → remove (body: task_id, blocked_by)"

deployment:
  workflow: >
    All changes made via Claude MCP (PotatoMCP connector).
    1. write_file to edit code in /opt/organizer/repo/
    2. bash to test or inspect
    3. git_commit_push with descriptive message
    4. deploy to npm install + restart
    5. logs to verify
  systemd_service: organizer
  restart_command: "systemctl restart organizer"
  env_vars_location: /etc/systemd/system/organizer.service

design_principles:
  - "Single-file SPA — all HTML/CSS/JS in public/index.html"
  - "No build step, no bundler, no React/Vue — vanilla JS only"
  - "Dark theme, mobile-first, 640px max-width"
  - "Minimal dependencies — only express and better-sqlite3"
  - "Watch Dogs 1 inspired skill tree for dependency visualization"
  - "Domain colors: CTI=#60a5fa, ECM=#c084fc, CSD=#5eead4, GRA=#7dd3fc, Personal=#a5b4fc"
  - "All state in SQLite — no localStorage, no cookies"
  - "No hardcoded secrets in code — public repo"

ui_layout:
  description: >
    Split-panel layout: left 40% is a scrollable task list (cards),
    right 60% is a Watch Dogs-style radial skill tree showing the
    blocker/dependency DAG. Nodes are tasks, edges are blocker relationships.
    Completed tasks glow (domain color), blocked tasks are dimmed/locked,
    in-progress tasks pulse. Clicking a node in the tree selects it in the list
    and vice versa.

orientation_commands:
  check_db: "sqlite3 /opt/organizer/data/organizer.db '.tables'"
  task_count: "sqlite3 /opt/organizer/data/organizer.db 'SELECT COUNT(*) FROM tasks;'"
  users: "sqlite3 /opt/organizer/data/organizer.db 'SELECT * FROM users;'"
  active_tasks: "sqlite3 /opt/organizer/data/organizer.db 'SELECT id, domain, name, done, archived FROM tasks WHERE archived = 0 ORDER BY sort_order;'"
  blockers: "sqlite3 /opt/organizer/data/organizer.db 'SELECT b.task_id, t1.name, b.blocked_by, t2.name FROM blockers b JOIN tasks t1 ON t1.id = b.task_id JOIN tasks t2 ON t2.id = b.blocked_by;'"
  service_status: "systemctl status organizer --no-pager | head -10"
  recent_commits: "cd /opt/organizer/repo && git log --oneline -10"

common_fixes:
  app_wont_start: "Check logs service=organizer. Usually a syntax error in server.js."
  db_locked: "SQLite WAL mode should prevent this. If stuck: cp organizer.db organizer.db.bak && sqlite3 organizer.db 'PRAGMA wal_checkpoint(TRUNCATE);'"
  permission_error: "chown -R deploy:deploy /opt/organizer/repo"
  nginx_502: "App not running on port 3000. systemctl restart organizer"
  mcp_disconnected: "systemctl restart organizer-mcp. Then re-add connector in Claude."
