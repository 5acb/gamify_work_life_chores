# Project Context — gamify_work_life_chores
# Read this file FIRST in any new chat session, then run orientation_commands.
# Last updated: 2025-02-12

project:
  name: gamify_work_life_chores
  domain: 7ay.de
  description: >
    Personal task organizer with dependency tracking, subtasks, progress bars,
    timeline view, multi-user boards, and Gemini AI integration.
    Built for managing academic deadlines, work tasks, and personal chores.
  repo: https://github.com/5acb/gamify_work_life_chores
  infra_repo: https://github.com/5acb/7ay_de_infra (private)

server:
  ip: 164.92.90.91
  provider: DigitalOcean SFO3
  os: Ubuntu 24.04 LTS
  node: v22
  domain: 7ay.de
  ssl: Let's Encrypt (auto-renew)
  deploy_user: deploy

architecture:
  overview: >
    Split-file SPA frontend (index.html shell + style.css + app.js) + Express REST API
    (server.js ~300 lines) + SQLite WAL. No build step, no bundler, no framework.
    Vanilla JS + CSS. Three systemd services (organizer, organizer-mcp, organizer-commit), 
    Nginx reverse proxy. Gemini AI integration via MCP server (McpServer SDK, SSE transport, 
    token auth) with 5 subagents and Mem0 memory integration (knowledge base).
  ports:
    3000: "App server (Express + SQLite) — proxied by Nginx on /"
    3001: "commit-daemon (socat + bash, localhost-only) — proxied on /api/commit"
    3002: "MCP server (SSE transport, token auth) — proxied on /mcp"
  auth_flow: >
    Custom session-based authentication using signed cookies (sid). 
    Passwords validated against /etc/nginx/.htpasswd via `htpasswd -v -i` child process.
    Sessions are HMAC-signed (slug.ts.hmac) using a persistent secret in 
    /opt/organizer/data/.session_secret. 30-day expiry.
  security:
    - "Custom session verification with timing-safe HMAC checks"
    - "ensureAuth/requireTaskOwner/requireSubtaskOwner ownership checks"
    - "Audit logging: task_events table tracks all mutations (id, task_id, user_id, action, detail, ts)"
    - "CSRF: X-Requested-With: XMLHttpRequest required on all non-GET requests"
    - "CSP header: default-src 'self'; script-src 'self' https://cdnjs.cloudflare.com; style-src 'self'; img-src 'self' data:; connect-src 'self'; font-src 'self'"
    - "X-Frame-Options: DENY, X-Content-Type-Options: nosniff"
    - "Referrer-Policy: strict-origin-when-cross-origin"
    - "Rate limiting: Gemini endpoint 5 req/min/user (Express), nginx 30r/m burst=20"
    - "Input validation: task name 500 chars, labels 100, subtask 500"
    - "Domain allowlist: VALID_DOMAINS (CTI, ECM, CSD, GRA, Personal) checked on mutations"
    - "Bound to 127.0.0.1:3000 — nginx handles external traffic"
    - "Backup outside repo at /opt/organizer/data/backups/"
  database:
    engine: SQLite (WAL mode, foreign_keys ON)
    path: /opt/organizer/data/organizer.db
    orm: none — raw SQL via better-sqlite3
    backup: "cron every 7min → sqlite3 .dump → /opt/organizer/data/backups/"
    queries: "Single-query task fetching with SQLite JSON aggregation"

