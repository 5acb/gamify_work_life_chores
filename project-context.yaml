# Project Context — gamify_work_life_chores
# Read this file FIRST in any new chat session, then run orientation_commands.
# Last updated: 2025-05-22

project:
  name: gamify_work_life_chores
  domain: 7ay.de
  description: >
    Personal task organizer with dependency tracking, subtasks, progress bars,
    timeline view, multi-user boards, and advanced Gemini AI orchestration.
    The interface is an **Atmospheric Sanctuary**—a 2:1 split-pane interface 
    fusing skeuomorphic glass aesthetics with an oceanic palette and 
    domain-specific materials (e.g., Kingfisher, Cyberspace Grid).
  repo: https://github.com/5acb/gamify_work_life_chores
  infra_repo: https://github.com/5acb/7ay_de_infra (private)

server:
  ip: 164.92.90.91
  provider: DigitalOcean SFO3
  os: Ubuntu 24.04 LTS
  node: v22
  domain: 7ay.de
  ssl: Let's Encrypt (auto-renew)
  deploy_user: deploy

architecture:
  overview: >
    Split-file SPA frontend (Vanilla JS/CSS) + Express REST API + SQLite WAL. 
    AI integration uses gemini-3-flash-preview across all layers: direct 
    invocation for UI chat and a dedicated MCP Server for complex planning, 
    terminal access, and autonomous agent workflows.
  ui_paradigm: >
    Atmospheric Sanctuary. Uses 2:1 split pane (Worktree vs Task List). 
    Features Donut Indicators for temporal frequency and a Sanctuary Indicator Line. 
    Custom reordering via Sortable.js. Domains utilize specific "Materials" 
    (kingfisher, cyberspace-grid, saffron-road, amethyst-sky, sun-baked-clay) 
    for visual identity. Rendering utilizes HGT Digital Elevation Model data 
    (terrain/S36E149.DAT) for terrain backgrounds.
  ai_orchestration: >
    A dedicated MCP server provides a tool-augmented environment. It features:
    1. Subagent framework: Specialized personas defined in subagents.js (Plan, Execute, Review).
    2. Plan Sessions: Multi-step AI-driven workflows for task decomposition and state analysis,
       tracked via session_events and session_decisions tables.
    3. Knowledge Base: Integration with Mem0 (localhost:8000) for long-term project context.
    4. Auto-Commit: A commit-daemon (socat+bash) logs changes to a blockchain-style 
       cryptographic changelog (changelog.js) for auditability.
    5. Agentic CLI: Integration with @google/gemini-cli for --yolo autonomous execution.
  ports:
    3000: "App server (Express + SQLite) — proxied by Nginx on /"
    3001: "commit-daemon (localhost-only) — proxied on /api/commit"
    3002: "MCP server (SSE transport, token auth) — proxied on /mcp"
  auth_flow: >
    Modern passwordless-first authentication. Supports WebAuthn (Passkeys) for primary access
    via @simplewebauthn/server. Fallback authentication uses Argon2-hashed passwords. 
    Sessions are HMAC-signed using a persistent secret in /opt/organizer/data/.session_secret.
  security:
    - "Custom session verification with timing-safe HMAC checks"
    - "WebAuthn (Passkeys) with hardware authenticator support"
    - "Argon2 for robust, salted password hashing"
    - "CSP header: default-src 'self'; script-src 'self' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline';"
    - "Audit logging: task_events table tracks all mutations"
    - "CSRF protection via X-Requested-With header requirement"
  database:
    engine: SQLite (WAL mode, foreign_keys ON)
    path: /opt/organizer/data/organizer.db
    orm: none — raw SQL via better-sqlite3
    backup: "cron every 7min → scripts/backup.sh → /opt/organizer/data/backups/"

services:
  organizer.service: "Main Express app and task API"
  organizer-mcp.service: "MCP Server (SSE) for AI tool execution"
  organizer-commit.service: "Socat-based commit-daemon for changelog audit"

files:
  JOURNEY.md: "Narrative chronicle of the Sanctuary UI evolution"
  DESIGN.md: "Foundational Design Laws for the Sanctuary"
  GEMINI.md: "AI integration and prompt engineering documentation"
  KICKSTART.md: "Quickstart guide for environment setup"
  TODO.md: "Project roadmap and pending features"
  schema.sql: "Full database schema definitions"
  backup.sql: "Database dump for recovery/migration"
  mcp-server/server.js: "MCP Server — SSE transport, Tool definitions, Gemini Agent logic"
  mcp-server/subagents.js: "Specialized AI personas (Plan, Execute, Review)"
  mcp-server/changelog.js: "Cryptographic audit trail for AI actions"
  mcp-server/icon.png: "MCP server branding"
  public/app.js: "Frontend JS — routing, Sanctuary rendering, AI chat interface"
  public/changelog.html: "Visual interface for the cryptographic audit trail"
  public/index.html: "Main entry point for the Sanctuary UI"
  public/style.css: "Atmospheric Sanctuary styles and material definitions"
  public/vendor/: "External libraries (Sortable.js, SimpleWebAuthn)"
  server.js: "Express API — WebAuthn, task persistence, Gemini Direct Invoke"
  scripts/kb.py: "Knowledge base / Mem0 integration scripts"
  scripts/kb-pyproject.toml: "Python dependencies for KB scripts"
  scripts/post-session-kb.sh: "Post-session hook for KB synchronization"
  scripts/setup-mcp-client.sh: "Utility to configure local MCP clients"
  scripts/test-render.sh: "Canvas/UI rendering test utility"
  terrain/S36E149.DAT: "HGT Digital Elevation Model data for atmospheric rendering"
  .gemini/settings.json: "Gemini CLI and agent configuration"

database_schema:
  users:
    columns: [id, name, slug, password_hash, created_at]
  domains:
    columns: [id, user_id, name, slug, material, sort_order]
    notes: "Slugs: CTI, CSD, ECM, GRA, PER. Materials: kingfisher, cyberspace-grid, saffron-road, amethyst-sky, sun-baked-clay."
  tasks:
    columns: [id, domain, name, plan_date, due_date, plan_label, due_label, speed, stakes, sort_order, done, archived, archived_at, user_id, created_at, updated_at]
  subtasks:
    columns: [id, task_id, label, done, sort_order, created_at]
  blockers:
    columns: [task_id, blocked_by]
    notes: "Self-referencing tasks table for dependency graphing."
  credentials:
    columns: [id, user_id, public_key, counter, transports, created_at]
    notes: "WebAuthn / Passkey storage."
  auth_challenges:
    columns: [user_id, challenge, expires_at]
  task_events:
    columns: [id, task_id, user_id, action, detail, ts]
  plan_sessions:
    columns: [id, triggered, domain, task_ids, started_at, ended_at, task_snapshot]
  session_events:
    columns: [id, session_id, ts, agent, event_type, task_id, content]
  session_decisions:
    columns: [id, session_id, ts, decision_type, task_id, proposed_by, accepted, outcome_validated, rationale]
  task_observations:
    columns: [id, task_id, session_id, ts, observer, observation, content, task_state_snap]
  meta_insights:
    columns: [id, generated_at, insight_type, domain, content, evidence, confidence, surfaced]
  ui_state:
    columns: [key, value]
